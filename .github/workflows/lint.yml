name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx jshint src/js/ --config .jshintrc

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout Pebble SDK devcontainer
        uses: actions/checkout@v6
        with:
          repository: FBarrCa/pebble-devcontainer
          path: pebble-devcontainer
      - name: Build Pebble SDK container
        run: docker build -t pebble-sdk --build-arg PEBBLE_SDK_VERSION=4.9.148 pebble-devcontainer
      - name: Build app
        run: docker run --rm -v $PWD:/app -w /app pebble-sdk bash -c "mkdir -p ~/.pebble-sdk && touch ~/.pebble-sdk/NO_TRACKING && npm install && pebble build"
