name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx jshint src/js/ --config .jshintrc

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install uv
        run: pip install uv
      - name: Install pebble-tool
        run: |
          uv tool install pebble-tool --python 3.13
          mkdir -p ~/.pebble-sdk && touch ~/.pebble-sdk/NO_TRACKING
      - name: Install Pebble SDK
        run: pebble sdk install 4.9.148
      - run: npm install
      - run: pebble build
